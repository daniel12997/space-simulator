name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Windows / MSVC support is tracked as a Phase 1 followup. NAIF distributes
  # a separate CSPICE tarball for Windows; the Linux source has multiple small
  # MSVC incompatibilities (complex-math header conflicts, isatty redefinition
  # in inquire.c, ...). The proper fix is OS-conditional fetch in
  # cmake/fetch_external.cmake, not piecemeal patching of upstream source.
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            toolchain: gcc-13
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-24.04
            toolchain: clang-17
            cc: clang-17
            cxx: clang++-17

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ncompress
          if [ "${{ matrix.toolchain }}" = "gcc-13" ]; then
            sudo apt-get install -y gcc-13 g++-13
          else
            sudo apt-get install -y clang-17 clang-tools-17 clang-format-17 clang-tidy-17 lld-17
          fi

      - name: Cache external/_cache (SOFA, CSPICE tarballs)
        uses: actions/cache@v4
        with:
          path: external/_cache
          key: ext-${{ runner.os }}-${{ hashFiles('cmake/CPM_VERSION', 'external/sofa/PINNED_VERSION', 'external/cspice/PINNED_VERSION') }}

      - name: Cache CPM source cache
        uses: actions/cache@v4
        with:
          path: ~/cpm_cache
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/apsis_dependencies.cmake', 'cmake/CPM_VERSION') }}

      - name: Configure
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: clang-format check
        if: matrix.toolchain == 'clang-17'
        run: |
          files=$(git ls-files '*.cc' '*.h' | grep -Ev '^(external|build)/' || true)
          if [ -n "$files" ]; then
            clang-format-17 --dry-run --Werror $files
          fi

      - name: clang-tidy check (first-party only)
        if: matrix.toolchain == 'gcc-13'
        run: |
          sudo apt-get install -y clang-tidy-17
          files=$(git ls-files 'src/*.cc' 'include/apsis/*.h')
          if [ -n "$files" ]; then
            clang-tidy-17 -p build $files
          fi

      - name: CSPICE seam lint
        run: python3 tools/lint/cspice_seam.py --root .

      # Phase 1 §11: gcov coverage gate. Runs only on the gcc-13 Linux
      # job per ADR-013 / Phase 1 plan §11. The threshold is 80% statement
      # coverage on first-party files; vendored upstreams excluded.
      - name: Install lcov (for coverage)
        if: matrix.toolchain == 'gcc-13'
        run: sudo apt-get install -y lcov

      - name: Configure (coverage)
        if: matrix.toolchain == 'gcc-13'
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
        run: |
          cmake -S . -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAPSIS_ENABLE_COVERAGE=ON

      - name: Build (coverage)
        if: matrix.toolchain == 'gcc-13'
        run: cmake --build build-cov --parallel

      - name: Test (coverage)
        if: matrix.toolchain == 'gcc-13'
        run: ctest --test-dir build-cov --output-on-failure

      - name: Coverage gate
        if: matrix.toolchain == 'gcc-13'
        run: cmake --build build-cov --target coverage

      - name: Upload coverage artefact
        if: matrix.toolchain == 'gcc-13'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: build-cov/coverage/lcov.info

      # Phase 1 §12: REQ-* traceability lint (soft mode default; the CI
      # gate WARNS but does not fail until STRICT_REQ_TRACEABILITY=1 is set).
      - name: REQ traceability lint (soft)
        if: matrix.toolchain == 'gcc-13'
        run: python3 tools/lint/req_traceability.py --root .

  sanitizers:
    name: ubuntu-24.04 / clang-17 / ASan+UBSan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ncompress clang-17 lld-17

      - name: Cache external/_cache
        uses: actions/cache@v4
        with:
          path: external/_cache
          key: ext-Linux-${{ hashFiles('cmake/CPM_VERSION', 'external/sofa/PINNED_VERSION', 'external/cspice/PINNED_VERSION') }}

      - name: Cache CPM source cache
        uses: actions/cache@v4
        with:
          path: .cpm-cache
          key: cpm-Linux-${{ hashFiles('cmake/apsis_dependencies.cmake', 'cmake/CPM_VERSION') }}

      - name: Configure (sanitizers, Debug)
        env:
          CC:  clang-17
          CXX: clang++-17
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
        run: |
          cmake -S . -B build-san -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAPSIS_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-san --parallel

      - name: Test
        run: ctest --test-dir build-san --output-on-failure
